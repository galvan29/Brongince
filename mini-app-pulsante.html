<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini App - Pulsante</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
    }
    button {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: var(--tg-theme-button-color, #2ea6ff);
      color: var(--tg-theme-button-text-color, #fff);
      cursor: pointer;
    }
    #counter { margin-top: 20px; font-size: 20px; }
  </style>
</head>
<body>
  <button id="myButton">Cliccami</button>
  <div id="counter">Click: 0</div>

  <script>
    // Inizializza l'app dentro Telegram
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // apre a schermo intero

    let count = 0;
    const counterEl = document.getElementById('counter');

    // Carica il valore salvato all'avvio
    tg.CloudStorage.getItem('click_count', (err, value) => {
      if (!err && value) {
        count = parseInt(value, 10) || 0;
        counterEl.innerText = "Click: " + count;
      }
    });

    document.getElementById('myButton').addEventListener('click', () => {
      count++;
      counterEl.innerText = "Click: " + count;
      tg.HapticFeedback.impactOccurred('light'); // vibrazione leggera

      // Salva il nuovo valore
      tg.CloudStorage.setItem('click_count', String(count), (err, success) => {
        if (err) console.error('Errore salvataggio:', err);
      });
    });
  </script>
</body>
</html>
